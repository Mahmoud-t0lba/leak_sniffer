name: leak_sniffer
description: A custom lint package for Dart & Flutter that detects unclosed, uncancelled, and undisposed resources to help prevent memory leaks.
version: 0.1.1
homepage: https://github.com/Mahmoud-t0lba/leak_sniffer
repository: https://github.com/Mahmoud-t0lba/leak_sniffer
issue_tracker: https://github.com/Mahmoud-t0lba/leak_sniffer/issues
screenshots:
  - description: Leak Sniffer package banner showing the resource leaks it helps detect.
    path: screenshots/leak_sniffer.png
topics:
  - custom-lint
  - flutter
  - static-analysis
  - memory-leaks

environment:
  sdk: ^3.11.3

dependencies:
  analyzer: ^8.4.0
  collection: ^1.19.1
  custom_lint: ^0.8.1
  custom_lint_builder: ^0.8.1
  lints: ^6.1.0
  meta: ^1.17.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.2

dev_dependencies:
  analyzer_plugin: ^0.13.10
  test: ^1.31.0
