name: leak_sniffer
description: A custom lint package for Dart & Flutter that detects unclosed, uncancelled, and undisposed resources to help prevent memory leaks.
version: 0.1.0
topics:
  - custom-lint
  - flutter
  - static-analysis
  - memory-leaks

environment:
  sdk: ^3.11.3

dependencies:
  analyzer: ^8.4.0
  analyzer_plugin: ^0.13.10
  collection: ^1.19.1
  custom_lint: ^0.8.1
  custom_lint_builder: ^0.8.1
  lints: ^6.1.0
  meta: ^1.17.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.2

dev_dependencies:
  test: ^1.31.0
